<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>正在更新我的歌谱</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f7f5ef;
        color: #1f2933;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      main {
        width: min(88vw, 420px);
        padding: 28px;
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        background: #fffdf8;
        box-shadow: 0 18px 50px rgba(31, 41, 51, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #6b7280;
        line-height: 1.7;
      }

      button {
        margin-top: 20px;
        min-height: 44px;
        padding: 0 18px;
        border: 0;
        border-radius: 999px;
        background: #2563eb;
        color: #fff;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>正在切换到最新版本</h1>
      <p id="message">正在清理旧缓存，请稍等...</p>
      <button id="retryButton" type="button" hidden>重新进入</button>
    </main>
    <script>
      async function clearOldAppCache() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.allSettled(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.allSettled(keys.map((key) => caches.delete(key)));
        }
      }

      function goHome() {
        window.location.replace(`./index.html?refresh=${Date.now()}`);
      }

      clearOldAppCache()
        .then(() => {
          document.querySelector("#message").textContent = "旧缓存已清理，正在进入最新版...";
          window.setTimeout(goHome, 500);
        })
        .catch((error) => {
          console.warn(error);
          document.querySelector("#message").textContent = "自动清理遇到问题，请点击重新进入。";
          document.querySelector("#retryButton").hidden = false;
        });

      document.querySelector("#retryButton").addEventListener("click", goHome);
    </script>
  </body>
</html>
