<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f766e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="我的谱夹" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>我的谱夹</title>
    <link rel="manifest" href="manifest.webmanifest?v=58" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png?v=47" />
    <link rel="apple-touch-icon" href="icons/icon-192.png?v=47" />
    <link rel="stylesheet" href="styles.css?v=58" />
    <script defer charset="UTF-8" src="vendor/lucide.min.js?v=47"></script>
    <script defer charset="UTF-8" src="cloudbase-config.js?v=47"></script>
    <script defer charset="UTF-8" src="app.js?v=58"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true">
            <img src="icons/icon-192.png?v=47" alt="" />
          </span>
          <div>
            <h1>我的谱夹</h1>
            <p id="librarySummary">正在读取谱夹</p>
          </div>
        </div>
        <button class="install-button" id="installAppButton" type="button" hidden>
          <i data-lucide="download" aria-hidden="true"></i>
          <span>安装</span>
        </button>
      </header>

      <main class="workspace" id="libraryScreen">
        <section class="library-panel" aria-labelledby="libraryTitle">
          <div class="library-head">
            <div>
              <div class="library-title-row">
                <button
                  class="icon-button folder-back-button"
                  id="folderBackButton"
                  type="button"
                  title="返回谱夹"
                  aria-label="返回谱夹"
                  hidden
                >
                  <i data-lucide="arrow-left" aria-hidden="true"></i>
                </button>
                <h2 id="libraryTitle">谱夹</h2>
              </div>
              <p id="resultCount">0 份歌谱</p>
            </div>
            <div class="library-actions" aria-label="歌谱操作">
              <button class="icon-button" id="syncNowButton" type="button" title="立即同步" aria-label="立即同步">
                <i data-lucide="refresh-cw" aria-hidden="true"></i>
              </button>
              <button class="icon-button" id="shareScoresButton" type="button" title="分享歌谱" aria-label="分享歌谱">
                <i data-lucide="share-2" aria-hidden="true"></i>
              </button>
              <button class="icon-button" id="importShareButton" type="button" title="输入同步码" aria-label="输入同步码">
                <i data-lucide="key-round" aria-hidden="true"></i>
              </button>
            </div>
          </div>

          <div class="searchbar">
            <i data-lucide="search" aria-hidden="true"></i>
            <label class="sr-only" for="searchInput">搜索歌谱名</label>
            <input id="searchInput" type="search" placeholder="搜索歌谱名" autocomplete="off" />
            <button class="icon-button" id="clearSearchButton" type="button" title="清空搜索" aria-label="清空搜索">
              <i data-lucide="x" aria-hidden="true"></i>
            </button>
          </div>

          <div class="score-grid" id="scoreGrid" aria-live="polite"></div>
        </section>
      </main>

      <main class="workspace my-screen" id="myScreen" hidden>
        <section class="mine-panel" aria-labelledby="myTitle">
          <div class="mine-head">
            <h2 id="myTitle">我的</h2>
          </div>

          <div class="mine-menu" aria-label="我的功能">
            <button class="mine-strip-button" id="myAccountButton" type="button">
              <span class="mine-strip-icon" aria-hidden="true">
                <i data-lucide="user-round"></i>
              </span>
              <span>账号管理</span>
              <i data-lucide="chevron-right" aria-hidden="true"></i>
            </button>
            <button class="mine-strip-button" id="preferencesButton" type="button">
              <span class="mine-strip-icon" aria-hidden="true">
                <i data-lucide="settings-2"></i>
              </span>
              <span>偏好设置</span>
              <i data-lucide="chevron-right" aria-hidden="true"></i>
            </button>
          </div>

          <div class="mine-auth-panel">
            <p class="mine-auth-state" id="myAuthState">登录后可以跨设备同步歌谱。</p>
            <button class="primary-button mine-auth-button" id="myAuthButton" type="button">
              <i data-lucide="log-in" aria-hidden="true"></i>
              <span id="myAuthButtonText">登录 / 注册</span>
            </button>
          </div>
        </section>
      </main>

      <section class="upload-screen" id="uploadScreen" aria-labelledby="uploadTitle" hidden>
        <form class="upload-tool" id="scoreForm">
          <div class="tool-head">
            <div class="tool-title">
              <button class="icon-button" id="closeAddButton" type="button" title="返回谱夹" aria-label="返回谱夹">
                <i data-lucide="arrow-left" aria-hidden="true"></i>
              </button>
              <h2 id="uploadTitle">新增歌谱</h2>
            </div>
            <button class="icon-button" id="resetFormButton" type="button" title="清空表单" aria-label="清空表单">
              <i data-lucide="rotate-ccw" aria-hidden="true"></i>
            </button>
          </div>

          <label class="field">
            <span>歌谱名</span>
            <input id="scoreName" name="scoreName" type="text" maxlength="60" placeholder="例如：送别" required />
          </label>

          <div class="source-group" role="group" aria-label="上传方式">
            <button class="source-button" type="button" id="cameraButton">
              <i data-lucide="camera" aria-hidden="true"></i>
              <span>拍照</span>
            </button>
            <button class="source-button" type="button" id="galleryButton">
              <i data-lucide="images" aria-hidden="true"></i>
              <span>图库</span>
            </button>
            <button class="source-button" type="button" id="fileButton">
              <i data-lucide="folder-up" aria-hidden="true"></i>
              <span>文件</span>
            </button>
          </div>

          <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden />
          <input id="galleryInput" type="file" accept="image/*" multiple hidden />
          <input id="fileInput" type="file" accept="image/*" multiple hidden />

          <div class="pending-area" id="pendingArea"></div>

          <button class="primary-button" id="saveButton" type="submit" disabled>
            <i data-lucide="save" aria-hidden="true"></i>
            <span>保存歌谱</span>
          </button>

          <p class="status-message" id="statusMessage" role="status"></p>
        </form>
      </section>

      <button class="fab-button" id="addScoreButton" type="button" title="添加歌谱" aria-label="添加歌谱">
        <img class="fab-art" src="assets/add-score-button.png?v=47" alt="" />
        <span class="fab-fallback">添加歌谱</span>
      </button>

      <nav class="bottom-nav" aria-label="底部导航">
        <button class="bottom-nav-button is-active" id="navLibraryButton" type="button" aria-current="page">
          <i data-lucide="folder-open" aria-hidden="true"></i>
          <span>谱夹</span>
        </button>
        <button class="bottom-nav-button" id="navMineButton" type="button">
          <i data-lucide="user-round" aria-hidden="true"></i>
          <span>我的</span>
        </button>
      </nav>
    </div>

    <dialog class="auth-dialog" id="authDialog" aria-labelledby="authDialogTitle">
      <form class="auth-surface" id="authForm">
        <div class="auth-head">
          <button class="icon-button auth-back-button" id="authBackButton" type="button" title="返回" aria-label="返回" hidden>
            <i data-lucide="arrow-left" aria-hidden="true"></i>
          </button>
          <h2 id="authDialogTitle">账号登录</h2>
          <button class="icon-button" id="closeAuthButton" type="button" title="关闭" aria-label="关闭">
            <i data-lucide="x" aria-hidden="true"></i>
          </button>
        </div>
        <p class="auth-state" id="authState">登录后可以跨设备同步歌谱。</p>

        <div class="auth-pane" id="authLoggedInPane" hidden>
          <button class="confirm-delete-button signout-only-button" id="signOutButton" type="button">退出登录</button>
        </div>

        <div class="auth-pane auth-entry-pane" id="authGuestPane">
          <div class="auth-register-hint">还没有账号？点击去注册</div>
          <button class="cancel-delete-button" id="signUpButton" type="button">注册</button>
          <button class="confirm-delete-button folder-save-button" id="loginChoiceButton" type="button">登录</button>
        </div>

        <div class="auth-pane" id="authLoginPane" hidden>
          <label class="field">
            <span>手机号或邮箱</span>
            <input id="authEmail" name="account" type="text" autocomplete="username" placeholder="请输入手机号或邮箱" />
          </label>
          <label class="field">
            <span>密码</span>
            <input id="authPassword" name="password" type="password" autocomplete="current-password" minlength="6" placeholder="请输入密码" />
          </label>
          <button class="confirm-delete-button folder-save-button auth-wide-button" id="signInButton" type="submit">
            <i data-lucide="log-in" aria-hidden="true"></i>
            <span>登录</span>
          </button>
        </div>

        <div class="auth-pane auth-choice-pane" id="authRegisterChoicePane" hidden>
          <button class="choice-button" id="registerPhoneOption" type="button">
            <i data-lucide="smartphone" aria-hidden="true"></i>
            <span>手机验证码注册</span>
          </button>
          <button class="choice-button" id="registerEmailOption" type="button">
            <i data-lucide="mail" aria-hidden="true"></i>
            <span>邮箱验证码注册</span>
          </button>
        </div>

        <div class="auth-pane" id="authRegisterCodePane" hidden>
          <label class="field">
            <span id="registerContactLabel">手机号</span>
            <input id="registerContactInput" type="tel" autocomplete="tel" placeholder="请输入手机号" />
          </label>
          <button class="cancel-delete-button auth-wide-button" id="sendRegisterCodeButton" type="button">发送验证码</button>
          <label class="field">
            <span>验证码</span>
            <input id="registerCodeInput" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="12" placeholder="请输入验证码" />
          </label>
          <button class="confirm-delete-button folder-save-button auth-wide-button" id="nextRegisterPasswordButton" type="button">下一步</button>
        </div>

        <div class="auth-pane" id="authRegisterPasswordPane" hidden>
          <label class="field">
            <span>设置密码</span>
            <input id="registerPassword" type="password" autocomplete="new-password" minlength="6" placeholder="请输入密码" />
          </label>
          <label class="field">
            <span>再次输入密码</span>
            <input id="registerPasswordConfirm" type="password" autocomplete="new-password" minlength="6" placeholder="请再次输入密码" />
          </label>
          <button class="confirm-delete-button folder-save-button auth-wide-button" id="completeRegisterButton" type="button">完成注册</button>
        </div>
      </form>
    </dialog>

    <dialog class="auth-dialog" id="verifyDialog" aria-labelledby="verifyDialogTitle">
      <form class="auth-surface" id="verifyForm">
        <div class="auth-head">
          <h2 id="verifyDialogTitle">验证邮箱</h2>
          <button class="icon-button" id="cancelVerifyButton" type="button" title="关闭" aria-label="关闭">
            <i data-lucide="x" aria-hidden="true"></i>
          </button>
        </div>
        <p class="auth-state" id="verifyState">请输入 CloudBase 发送到邮箱的验证码。</p>
        <label class="field">
          <span>验证码</span>
          <input
            id="verifyCodeInput"
            name="verifyCode"
            type="text"
            inputmode="numeric"
            autocomplete="one-time-code"
            maxlength="12"
            placeholder="请输入验证码"
            required
          />
        </label>
        <div class="auth-actions">
          <button class="cancel-delete-button" id="closeVerifyButton" type="button">取消</button>
          <button class="confirm-delete-button folder-save-button" id="confirmVerifyButton" type="submit">
            <i data-lucide="check" aria-hidden="true"></i>
            <span>完成验证</span>
          </button>
        </div>
      </form>
    </dialog>

    <dialog class="share-dialog" id="shareDialog" aria-labelledby="shareDialogTitle">
      <form class="share-surface" id="shareForm">
        <div class="auth-head">
          <h2 id="shareDialogTitle">分享歌谱</h2>
          <button class="icon-button" id="closeShareButton" type="button" title="关闭" aria-label="关闭">
            <i data-lucide="x" aria-hidden="true"></i>
          </button>
        </div>
        <label class="share-search">
          <i data-lucide="search" aria-hidden="true"></i>
          <input id="shareSearchInput" type="search" placeholder="搜索要分享的歌谱" autocomplete="off" />
        </label>
        <label class="share-select-all">
          <input id="shareSelectAll" type="checkbox" />
          <span>全选</span>
        </label>
        <div class="share-list" id="shareList"></div>
        <div class="share-code-panel" id="shareCodePanel" hidden>
          <span>同步码</span>
          <div class="share-code-row">
            <strong id="shareCodeText"></strong>
            <button class="copy-code-button" id="copyShareCodeButton" type="button">
              <i data-lucide="copy" aria-hidden="true"></i>
              <span>复制</span>
            </button>
          </div>
        </div>
        <p class="share-dialog-status" id="shareDialogStatus" role="status" aria-live="polite" hidden></p>
        <button class="primary-button" id="createShareButton" type="submit">
          <i data-lucide="share-2" aria-hidden="true"></i>
          <span>生成同步码</span>
        </button>
      </form>
    </dialog>

    <dialog class="share-dialog" id="importShareDialog" aria-labelledby="importShareTitle">
      <form class="share-surface" id="importShareForm">
        <div class="auth-head">
          <h2 id="importShareTitle">输入同步码</h2>
          <button class="icon-button" id="closeImportShareButton" type="button" title="关闭" aria-label="关闭">
            <i data-lucide="x" aria-hidden="true"></i>
          </button>
        </div>
        <label class="field">
          <span>同步码</span>
          <input id="shareCodeInput" name="shareCode" type="text" maxlength="12" placeholder="例如：8A6K2P9Q" required />
        </label>
        <button class="primary-button" id="importShareSubmitButton" type="submit">
          <i data-lucide="download-cloud" aria-hidden="true"></i>
          <span>导入分享歌谱</span>
        </button>
      </form>
    </dialog>

    <dialog class="choice-dialog" id="addChoiceDialog" aria-labelledby="addChoiceTitle">
      <div class="choice-surface">
        <h2 id="addChoiceTitle">添加内容</h2>
        <div class="choice-actions">
          <button class="choice-button" id="chooseFolderButton" type="button">
            <i data-lucide="folder-plus" aria-hidden="true"></i>
            <span>添加文件夹</span>
          </button>
          <button class="choice-button" id="chooseScoreButton" type="button">
            <i data-lucide="file-plus-2" aria-hidden="true"></i>
            <span>添加歌谱</span>
          </button>
        </div>
      </div>
    </dialog>

    <dialog class="folder-dialog" id="folderDialog" aria-labelledby="folderDialogTitle">
      <form class="folder-surface" id="folderForm">
        <span class="folder-mark" aria-hidden="true">
          <i data-lucide="folder-plus"></i>
        </span>
        <h2 id="folderDialogTitle">新建文件夹</h2>
        <label class="field folder-name-field">
          <span>文件夹名称</span>
          <input id="folderName" name="folderName" type="text" maxlength="40" placeholder="例如：主日敬拜" required />
        </label>
        <div class="confirm-actions">
          <button class="cancel-delete-button" id="cancelFolderButton" type="button">取消</button>
          <button class="confirm-delete-button folder-save-button" id="saveFolderButton" type="submit">
            <i data-lucide="check" aria-hidden="true"></i>
            <span>创建</span>
          </button>
        </div>
      </form>
    </dialog>

    <dialog class="confirm-dialog" id="deleteDialog" aria-labelledby="deleteDialogTitle">
      <div class="confirm-surface">
        <span class="confirm-mark" aria-hidden="true">
          <i data-lucide="trash-2"></i>
        </span>
        <h2 id="deleteDialogTitle">删除歌谱？</h2>
        <p id="deleteDialogMessage">删除后无法恢复。</p>
        <div class="confirm-actions">
          <button class="cancel-delete-button" id="cancelDeleteButton" type="button">取消</button>
          <button class="confirm-delete-button" id="confirmDeleteButton" type="button">
            <i data-lucide="trash-2" aria-hidden="true"></i>
            <span>删除</span>
          </button>
        </div>
      </div>
    </dialog>

    <dialog class="viewer-dialog" id="viewerDialog" aria-label="歌谱图片查看">
      <div class="viewer-surface">
        <div class="viewer-pages" id="viewerPages"></div>
      </div>
    </dialog>

    <noscript>请启用 JavaScript 后使用“我的谱夹”。</noscript>
  </body>
</html>
